services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - DATABASE_URL=/app/data/sqlite.db
      - DD_AGENT_HOST=datadog-agent
      - DD_SERVICE=acme-issue-tracker
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/issues"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  sqlite-data:
